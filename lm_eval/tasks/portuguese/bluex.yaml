tag:
  - pt_benchmark
  - vestibular

dataset_path: eduagarcia-temp/BLUEX_without_images # filter of portuguese-benchmark-datasets/BLUEX
task: bluex

test_split: train
fewshot_split: train

fewshot_config:
  sampler: first_n
  samples: !function util.bluex_fewshot_samples

num_fewshot: 3

description: "As perguntas a seguir são questões de múltipla escolha de provas de vestibular de universidades brasileiras, selecione a única alternativa correta e responda apenas com as letras \"A\", \"B\", \"C\", \"D\" ou \"E\".\n\n"

output_type: generate_until
doc_to_text: !function util.enem_doc_to_text
doc_to_target: "{{answerKey}}"

should_decontaminate: true
doc_to_decontamination_query: !function util.enem_doc_to_text

generation_kwargs:
  until:
    - "\n"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  top_k: null
  top_p: null

filter_list:
  - name: all
    filter:
      - function: normalize_spaces
      - function: remove_accents
      - function: find_choices
        choices: ["A", "B", "C", "D", "E"]
        regex_patterns: 
          - "(?:[Ll]etra|[Aa]lternativa|[Rr]esposta|[Rr]esposta [Cc]orreta|[Rr]esposta [Cc]orreta e|[Oo]pcao):? ([ABCDE])\\b"
          - "\\b([ABCDE])\\."          
          - "\\b([ABCDE]) ?[.):-]"
          - "\\b([ABCDE])$"
          - "\\b([ABCDE])\\b"
      - function: take_first

metric_list:
  - metric: acc
    aggregation: pt_acc
    higher_is_better: true

metadata:
  version: 1.2